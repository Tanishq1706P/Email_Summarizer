[build]
  publish = "."
  functions = "netlify/functions"
  command = "pip install -r requirements.txt"  # optional: install root deps if needed

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"
  python_version = "3.12"  # matches Vercel
