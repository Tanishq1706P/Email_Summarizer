version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: email_summarizer_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=email_summarizer
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    container_name: email_summarizer_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: email_summarizer_redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email_summarizer_api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - QDRANT_HOST=http://qdrant:6333
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://host.docker.internal:11434 # Assumes Ollama on host
    depends_on:
      - mongodb
      - qdrant
      - redis
    restart: always

volumes:
  mongodb_data:
  qdrant_data:
